<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Daily Planner</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
background:#eef1ff;
font-family:Arial;
transition:0.4s;
}

.dark{
background:#121212;
color:white;
}

.logo{
font-size:32px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.task{
padding:12px;
border-radius:8px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
animation:fade 0.4s;
}

.done{
text-decoration:line-through;
opacity:0.6;
}

.priority-high{background:#ffb3b3;}
.priority-medium{background:#fff0b3;}
.priority-low{background:#b3ffd9;}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1}
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="container text-center mt-5">

<h2 class="logo">🕒 Smart Daily Planner</h2>

<input id="username" class="form-control mt-3" placeholder="Enter your name">

<button class="btn btn-primary mt-3" onclick="login()">Start Planner</button>

</div>


<!-- MAIN APP -->

<div id="app" class="container-fluid mt-4" style="display:none">

<h3 id="welcome"></h3>

<button class="btn btn-dark mb-3" onclick="toggleTheme()">Toggle Theme</button>

<div class="row">

<!-- ADD TASK -->

<div class="col-md-4">

<h5>Add Task</h5>

<input id="taskInput" class="form-control mb-2" placeholder="Task name">

<input id="taskDate" type="date" class="form-control mb-2">

<input id="taskTime" type="time" class="form-control mb-2">

<select id="priority" class="form-control mb-2">
<option value="high">High Priority</option>
<option value="medium">Medium Priority</option>
<option value="low">Low Priority</option>
</select>

<button class="btn btn-success w-100 mb-2" onclick="addTask()">Add Task</button>

<button class="btn btn-warning w-100 mb-2" onclick="aiScheduler()">🤖 AI Schedule Task</button>

<button class="btn btn-primary w-100 mb-2" onclick="autoPlanDay()">🧠 AI Auto Plan Day</button>

<button class="btn btn-info w-100" onclick="generateWeeklyPlan()">📅 Weekly AI Timetable</button>

</div>


<!-- TASK LIST -->

<div class="col-md-4">

<h5>Tasks</h5>

<input id="search" class="form-control mb-2" placeholder="Search tasks" onkeyup="renderTasks()">

<ul id="taskList" class="list-group"></ul>

<button class="btn btn-danger mt-3 w-100" onclick="exportPDF()">Export Tasks PDF</button>

</div>


<!-- DASHBOARD -->

<div class="col-md-4">

<h5>Task Completion</h5>

<div class="progress mb-3">
<div id="progressBar" class="progress-bar bg-success" style="width:0%">0%</div>
</div>

<h5>Task Priority Chart</h5>

<canvas id="chart"></canvas>

<h5 class="mt-4">Weekly AI Plan</h5>

<ul id="weeklyPlan" class="list-group"></ul>

</div>

</div>

</div>


<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

function login(){

let name=document.getElementById("username").value;

if(!name)return;

localStorage.setItem("user",name);

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("welcome").innerText="Welcome "+name;

init();

}

function init(){

renderTasks();
chart();
updateProgress();

if(Notification.permission!=="granted"){
Notification.requestPermission();
}

}

function addTask(){

let text=document.getElementById("taskInput").value;
let date=document.getElementById("taskDate").value;
let time=document.getElementById("taskTime").value;
let priority=document.getElementById("priority").value;

if(!text)return;

tasks.push({text,date,time,priority,done:false});

save();
renderTasks();
chart();
updateProgress();

}

function aiScheduler(){

let text=document.getElementById("taskInput").value;
let date=document.getElementById("taskDate").value;

if(!text||!date){
alert("Enter task and date first");
return;
}

let start=9;
let end=18;

let used=tasks.filter(t=>t.date===date)
.map(t=>parseInt(t.time.split(":")[0]));

let suggested=null;

for(let i=start;i<=end;i++){
if(!used.includes(i)){
suggested=i;
break;
}
}

if(!suggested){
alert("Day full choose another date");
return;
}

let priority="low";

if(text.toLowerCase().includes("exam")||
text.toLowerCase().includes("project"))
priority="high";

else if(text.toLowerCase().includes("study"))
priority="medium";

let hour=suggested.toString().padStart(2,"0");

tasks.push({
text:text,
date:date,
time:hour+":00",
priority:priority,
done:false
});

alert("AI scheduled at "+hour+":00");

save();
renderTasks();
chart();
updateProgress();

}

function autoPlanDay(){

tasks.sort((a,b)=>{

let order={high:1,medium:2,low:3};

if(order[a.priority]!==order[b.priority])
return order[a.priority]-order[b.priority];

return a.time.localeCompare(b.time);

});

save();
renderTasks();

alert("AI rearranged tasks by priority and time");

}

function generateWeeklyPlan(){

let days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

let plan=document.getElementById("weeklyPlan");

plan.innerHTML="";

days.forEach(day=>{

let li=document.createElement("li");

li.className="list-group-item";

let suggestion="Focus on important tasks";

if(day==="Saturday"||day==="Sunday")
suggestion="Light work / review";

li.innerText=day+" : "+suggestion;

plan.appendChild(li);

});

}

function renderTasks(){

let list=document.getElementById("taskList");

let search=document.getElementById("search").value.toLowerCase();

list.innerHTML="";

tasks.filter(t=>t.text.toLowerCase().includes(search))
.forEach((task,i)=>{

let li=document.createElement("li");

li.className="task priority-"+task.priority+(task.done?" done":"");

li.innerHTML=`
${task.text} (${task.date} ${task.time})
<div>
<button onclick="done(${i})" class="btn btn-sm btn-success">✔</button>
<button onclick="del(${i})" class="btn btn-sm btn-danger">✖</button>
</div>
`;

list.appendChild(li);

});

Sortable.create(list,{animation:150});

}

function done(i){

tasks[i].done=true;

save();
renderTasks();
chart();
updateProgress();

}

function del(i){

tasks.splice(i,1);

save();
renderTasks();
chart();
updateProgress();

}

function updateProgress(){

let done=tasks.filter(t=>t.done).length;
let total=tasks.length;

let percent=total?Math.round((done/total)*100):0;

let bar=document.getElementById("progressBar");

bar.style.width=percent+"%";
bar.innerText=percent+"%";

}

function chart(){

let high=tasks.filter(t=>t.priority==="high").length;
let medium=tasks.filter(t=>t.priority==="medium").length;
let low=tasks.filter(t=>t.priority==="low").length;

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["High","Medium","Low"],
datasets:[{
label:"Tasks by Priority",
data:[high,medium,low],
backgroundColor:["#ff4d4d","#ffd633","#66ff99"]
}]
}

});

}

function exportPDF(){

const {jsPDF}=window.jspdf;

let doc=new jsPDF();

tasks.forEach((t,i)=>{

doc.text(`${i+1}. ${t.text} ${t.date} ${t.time}`,10,10+(i*10));

});

doc.save("tasks.pdf");

}

function reminders(){

let now=new Date().getTime();

tasks.forEach(t=>{

if(t.done)return;

let taskTime=new Date(t.date+" "+t.time).getTime();

let diff=taskTime-now;

if(diff>0 && diff<300000){

let minutes=Math.floor(diff/60000);

new Notification("Upcoming Task",{
body:t.text+" starts in "+minutes+" minute(s)"
});

}

});

}

setInterval(reminders,30000);

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
